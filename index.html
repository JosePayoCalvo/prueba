<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>

  <body>
    <a-scene>

      <a-assets>
        <img id="suelo" src="suelos.jpg">
        <img id="pared" src="paredes.jpg">
        <img id="viga" src="vigas.jpg">
        <img id="campo" src="campo.jpg">
      </a-assets>

      <a-box position="0 0.1 0" scale="3 0.2 3" src="#suelo"></a-box>

      <a-box position="0 1.7 -1.4" rotation="90 90 90"
             scale="3 0.2 3" src="#pared"></a-box>

      <a-box position="1.4 1.7 -1.125" rotation="90 0 90"
             scale="0.75 0.2 3" src="#pared"></a-box>

      <a-box position="1.4 1.7 1.125" rotation="90 0 90"
             scale="0.75 0.2 3" src="#pared"></a-box>

      <a-box position="1.4 2.825 0" rotation="90 0 90"
             scale="1.5 0.2 0.75" src="#pared"></a-box>

      <a-box position="1.4 0.575 0" rotation="90 0 90"
             scale="1.5 0.2 0.75" src="#pared"></a-box>

      <a-box position="-1.4 1.7 0" rotation="90 0 90"
             scale="3 0.2 3" src="#pared"></a-box>

      <a-box position="0 3.2 0" scale="3 0.2 3"
             src="#viga"></a-box>

      <a-sky src="#campo"></a-sky>

      <a-light type="ambient" color="#ECECEC"></a-light>

      <a-entity id="rig" position="-3 1 3">
        <a-camera id="camera"></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
